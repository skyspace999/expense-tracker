<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳">
<title>記帳工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f2f2f7;color:#1c1c1e;padding:16px;padding-bottom:40px;max-width:480px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin:12px 0 16px}
.section{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:500;color:#6c6c70;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:#f2f2f7;border-radius:10px;padding:12px 14px}
.stat-label{font-size:12px;color:#6c6c70;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.row{display:flex;gap:8px;margin-bottom:8px}
input,select{flex:1;min-width:0;padding:10px 12px;border:1px solid #e0e0e5;border-radius:10px;font-size:15px;background:#f9f9fb;color:#1c1c1e;-webkit-appearance:none;appearance:none;outline:none}
input:focus,select:focus{border-color:#007aff;background:#fff}
input[type=number]{width:90px;flex:0 0 90px}
.add-btn{width:100%;padding:12px;background:#007aff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.add-btn:active{background:#0062cc}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav button{background:#f2f2f7;border:none;border-radius:8px;padding:6px 14px;font-size:15px;cursor:pointer;color:#1c1c1e}
.month-label{font-size:16px;font-weight:500}
.cat-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-bar-label{font-size:13px;color:#6c6c70;width:52px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-track{flex:1;background:#f2f2f7;border-radius:4px;height:8px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px}
.cat-bar-amt{font-size:12px;color:#6c6c70;white-space:nowrap;min-width:52px;text-align:right}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #e5e5ea}
.tx-item:last-child{border-bottom:none}
.tx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:#6c6c70}
.tx-amt{font-size:14px;font-weight:500;white-space:nowrap}
.tx-del{background:none;border:none;cursor:pointer;font-size:18px;color:#aeaeb2;padding:0 4px;line-height:1}
.empty{font-size:13px;color:#aeaeb2;text-align:center;padding:20px 0}
</style>
</head>
<body>
<h1>記帳工具</h1>

<div class="section">
  <div class="month-nav">
    <button id="prev-btn">&#8592;</button>
    <span class="month-label" id="month-label"></span>
    <button id="next-btn">&#8594;</button>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-label">本月支出</div><div class="stat-val" id="total-amt">$0</div></div>
    <div class="stat"><div class="stat-label">筆數</div><div class="stat-val" id="total-count">0</div></div>
  </div>
</div>

<div class="section">
  <div class="sec-title">新增支出</div>
  <div class="row">
    <input type="text" id="inp-name" placeholder="名稱（如：午餐）" maxlength="30">
    <input type="number" id="inp-amt" placeholder="金額" min="0" step="1" inputmode="numeric">
  </div>
  <div class="row">
    <select id="inp-cat">
      <option value="餐飲">餐飲</option>
      <option value="交通">交通</option>
      <option value="購物">購物</option>
      <option value="娛樂">娛樂</option>
      <option value="醫療">醫療</option>
      <option value="住房">住房</option>
      <option value="其他">其他</option>
    </select>
    <input type="date" id="inp-date">
  </div>
  <button class="add-btn" id="add-btn">+ 新增</button>
</div>

<div class="section">
  <div class="sec-title">分類統計</div>
  <div id="cat-chart"><div class="empty">尚無資料</div></div>
</div>

<div class="section">
  <div class="sec-title">明細</div>
  <div id="tx-list"><div class="empty">尚無支出紀錄</div></div>
</div>

<script>
const CAT_COLORS={餐飲:"#34c759",交通:"#007aff",購物:"#ff2d55",娛樂:"#5856d6",醫療:"#ff9500",住房:"#ffcc00",其他:"#8e8e93"};
const KEY="expense-tracker";
let records=[];
let viewYear,viewMonth;

function today(){return new Date().toISOString().slice(0,10)}
function fmt(n){return"$"+Math.round(n).toLocaleString()}
function monthKey(y,m){return y+"-"+String(m+1).padStart(2,"0")}

function load(){try{const d=localStorage.getItem(KEY);if(d)records=JSON.parse(d);}catch(e){records=[];}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(records));}catch(e){}}

function getMonthRecords(){
  const mk=monthKey(viewYear,viewMonth);
  return records.filter(r=>r.date.startsWith(mk));
}

function render(){
  document.getElementById("month-label").textContent=viewYear+"年"+(viewMonth+1)+"月";
  const recs=getMonthRecords().sort((a,b)=>b.date.localeCompare(a.date));
  const total=recs.reduce((s,r)=>s+r.amount,0);
  document.getElementById("total-amt").textContent=fmt(total);
  document.getElementById("total-count").textContent=recs.length;
  renderCats(recs,total);
  renderList(recs);
}

function renderCats(recs,total){
  const el=document.getElementById("cat-chart");
  if(!recs.length){el.innerHTML='<div class="empty">尚無資料</div>';return;}
  const map={};
  recs.forEach(r=>{map[r.cat]=(map[r.cat]||0)+r.amount});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  el.innerHTML=sorted.map(([cat,amt])=>{
    const pct=total>0?Math.round(amt/total*100):0;
    const col=CAT_COLORS[cat]||"#8e8e93";
    return`<div class="cat-bar">
      <span class="cat-bar-label">${cat}</span>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="cat-bar-amt">${fmt(amt)}</span>
    </div>`;
  }).join("");
}

function renderList(recs){
  const el=document.getElementById("tx-list");
  if(!recs.length){el.innerHTML='<div class="empty">尚無支出紀錄</div>';return;}
  el.innerHTML=recs.map(r=>{
    const col=CAT_COLORS[r.cat]||"#8e8e93";
    return`<div class="tx-item">
      <div class="tx-dot" style="background:${col}"></div>
      <div class="tx-info">
        <div class="tx-name">${r.name}</div>
        <div class="tx-meta">${r.cat} · ${r.date}</div>
      </div>
      <div class="tx-amt">${fmt(r.amount)}</div>
      <button class="tx-del" data-id="${r.id}">&#215;</button>
    </div>`;
  }).join("");
  el.querySelectorAll(".tx-del").forEach(btn=>{
    btn.addEventListener("click",()=>{
      records=records.filter(r=>r.id!==btn.dataset.id);
      save();render();
    });
  });
}

document.getElementById("add-btn").addEventListener("click",()=>{
  const name=document.getElementById("inp-name").value.trim();
  const amt=parseFloat(document.getElementById("inp-amt").value);
  const cat=document.getElementById("inp-cat").value;
  const date=document.getElementById("inp-date").value;
  if(!name||!amt||amt<=0||!date)return;
  records.push({id:Date.now().toString(),name,amount:amt,cat,date});
  save();
  document.getElementById("inp-name").value="";
  document.getElementById("inp-amt").value="";
  const nd=new Date(date);
  viewYear=nd.getFullYear();viewMonth=nd.getMonth();
  render();
});

document.getElementById("prev-btn").addEventListener("click",()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}render();});
document.getElementById("next-btn").addEventListener("click",()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}render();});
document.getElementById("inp-name").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("add-btn").click();});

const now=new Date();
viewYear=now.getFullYear();viewMonth=now.getMonth();
document.getElementById("inp-date").value=today();
load();render();
</script>
</body>
</html>
